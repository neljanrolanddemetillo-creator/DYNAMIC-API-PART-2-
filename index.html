<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rick and Morty Explorer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Rick & Morty Character Explorer</h1>
        <p>Fetch and browse characters from the Rick and Morty API. Search, filter, and enjoy!</p>
        <input type="text" id="search" placeholder="Search by name..." />
    </header>
    
    <div id="spinner" class="spinner hidden"></div>
    <div id="error" class="error hidden"></div>
    
    <!-- Character Detail Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" alt="" />
                <div class="modal-info">
                    <h2 id="modalName"></h2>
                    <p><strong>Status:</strong> <span id="modalStatus"></span></p>
                    <p><strong>Species:</strong> <span id="modalSpecies"></span></p>
                    <p><strong>Gender:</strong> <span id="modalGender"></span></p>
                    <p><strong>Origin:</strong> <span id="modalOrigin"></span></p>
                    <p><strong>Location:</strong> <span id="modalLocation"></span></p>
                    <p><strong>Episodes:</strong> <span id="modalEpisodes"></span></p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="slider-wrapper">
        <button id="prevBtn" class="nav-btn">&#10094;</button>
        <main id="container" class="slider"></main>
        <button id="nextBtn" class="nav-btn">&#10095;</button>
    </div>
    <div class="controls">
        <button id="loadMore" class="load-btn">Load more characters</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
