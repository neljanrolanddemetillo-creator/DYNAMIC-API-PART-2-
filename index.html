<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rick and Morty Explorer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Rick & Morty Character Explorer</h1>
        <p>Fetch and browse characters from the Rick and Morty API. Search, filter, and enjoy!</p>
        <input type="text" id="search" placeholder="Search by name..." />
    </header>
    
    <div id="spinner" class="spinner hidden"></div>
    <div id="error" class="error hidden"></div>
    
    <div class="slider-wrapper">
        <button id="prevBtn" class="nav-btn">&#10094;</button>
        <main id="container" class="slider"></main>
        <button id="nextBtn" class="nav-btn">&#10095;</button>
    </div>
    <div class="controls">
        <button id="loadMore" class="load-btn">Load more characters</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
